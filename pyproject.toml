# pyproject.toml — Python tooling config for the whole monorepo.
# ruff + black target backend/ and the CMS Connector agent only.
# Vercel doesn't install dev deps so this file is a no-op at deploy time.

[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = [
    "backend/venv",
    "backend/migrations",   # SQL-only, not Python
    "backend/__pycache__",
    "**/__pycache__",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes (undefined names, unused imports)
    "I",    # isort (import order)
    "B",    # flake8-bugbear (likely bugs)
    "UP",   # pyupgrade (modern syntax)
    "C4",   # flake8-comprehensions
]
ignore = [
    "E501", # line length — black handles this
    "B008", # FastAPI uses `Depends()` defaults intentionally
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["F841"]  # tests sometimes assign for clarity

[tool.black]
line-length = 100
target-version = ["py313"]
extend-exclude = '''
/(
  backend/venv
  | backend/migrations
  | __pycache__
)/
'''

[tool.pytest.ini_options]
markers = [
    "integration: hits the deployed backend over the network",
    "deployed_state: requires deployed prod URL to match the test file's expectations. Skipped on dev push (Vercel only deploys to prod from master); run only on master push after a deploy-wait gate.",
]

# Adjustment-F — coverage tracking with a soft floor.
# `--cov-fail-under` blocks regressions: a PR that drops coverage below
# the floor fails CI. Bump the floor as test discipline improves.
# Source-only measurement; test files themselves are omitted.
[tool.coverage.run]
# Pytest runs from `backend/`, so source path is relative to that.
source = ["auth_service"]
omit = [
    "auth_service/tests/*",
    "auth_service/tests_integration/*",
    "*/venv/*",
    "*/__pycache__/*",
    "*/migrations/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    # Defensive branches that exist purely to surface a clearer error
    # before crashing — they're hard to exercise in tests.
    "raise HTTPException",
]
show_missing = true
skip_covered = false
