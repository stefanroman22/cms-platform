# .github/workflows/e2e.yml
# Backend integration + frontend E2E. Runs on every push to dev/master.
# Used by scheduled-merge.yml as a hard gate (in addition to ci.yml).

name: E2E

on:
  push:
    branches: [master, dev]
  workflow_dispatch:

# Default-deny token scope. Read-only is enough — this workflow does
# not push commits, comment on PRs, or modify releases.
permissions:
  contents: read

# TEST-001 — Single shared seed user / project. Running two branches'
# E2E in parallel races on `users.email = e2e@…` and the seeded project
# slug, leading to flakes that look like real regressions. Use one
# global lock; do not cancel the in-flight run when a new commit lands
# (cancellation mid-test corrupts the seed and breaks the next run too).
concurrency:
  group: e2e-shared
  cancel-in-progress: false

jobs:
  backend-integration:
    name: Backend integration (httpx → deployed FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            backend/requirements.lock
            backend/requirements-dev.lock
      # Install runs without secrets in env so a postinstall / build hook
      # in a poisoned dep cannot read them.
      # CI-004 / DEP-009 — `--require-hashes` blocks a poisoned upstream
      # PyPI artefact from being installed.
      - run: pip install --require-hashes -r requirements.lock -r requirements-dev.lock

      # `deployed_state` tests assert that the freshly-pushed code is
      # already running on the prod URL. Vercel only deploys to prod
      # from master, and even then with ~2-min build lag. So:
      #   • dev push: skip them (`-m "integration and not deployed_state"`).
      #   • master push: poll the deployed `/health` until it answers,
      #     then run the full set.
      - name: Wait for backend deploy (master only)
        if: github.ref == 'refs/heads/master'
        env:
          E2E_BASE_URL_BACKEND: ${{ secrets.E2E_BASE_URL_BACKEND }}
        run: |
          # Allow up to 4 min for Vercel to roll the new build.
          deadline=$(( $(date +%s) + 240 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            if curl -fsS "${E2E_BASE_URL_BACKEND:-https://cms-backend-roman.vercel.app}/health" >/dev/null; then
              echo "✅ backend /health responding"
              # Cushion for the frontend deploy + edge-cache propagation.
              sleep 60
              exit 0
            fi
            echo "waiting for backend /health…"
            sleep 10
          done
          echo "::error::backend deploy did not become healthy within 4 minutes"
          exit 1

      - name: Run integration tests (dev — skip deployed_state)
        if: github.ref != 'refs/heads/master'
        # Secrets only injected at the test step. CI-014 + CI-013.
        env:
          E2E_BASE_URL_BACKEND: ${{ secrets.E2E_BASE_URL_BACKEND }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ADMIN_API_KEY: ${{ secrets.E2E_ADMIN_API_KEY }}
        run: python -m pytest auth_service/tests_integration/ -v -m "integration and not deployed_state"

      - name: Run integration tests (master — full suite)
        if: github.ref == 'refs/heads/master'
        env:
          E2E_BASE_URL_BACKEND: ${{ secrets.E2E_BASE_URL_BACKEND }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ADMIN_API_KEY: ${{ secrets.E2E_ADMIN_API_KEY }}
        run: python -m pytest auth_service/tests_integration/ -v -m integration

  frontend-e2e:
    name: Frontend E2E (Playwright → deployed Next.js)
    runs-on: ubuntu-latest
    needs: backend-integration
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      # `--ignore-scripts` blocks postinstall hooks in a compromised
      # transitive dep (CI-005). E2E tests don't rely on any postinstall.
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright suite
        env:
          E2E_BASE_URL_FRONTEND: ${{ secrets.E2E_BASE_URL_FRONTEND }}
          E2E_BASE_URL_BACKEND: ${{ secrets.E2E_BASE_URL_BACKEND }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: npm test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
