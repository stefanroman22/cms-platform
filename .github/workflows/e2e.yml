# .github/workflows/e2e.yml
# Backend integration + frontend E2E. Runs on every push to dev/master.
# Used by scheduled-merge.yml as a hard gate (in addition to ci.yml).

name: E2E

on:
  push:
    branches: [master, dev]
  workflow_dispatch:

# Default-deny token scope. Read-only is enough — this workflow does
# not push commits, comment on PRs, or modify releases.
permissions:
  contents: read

# TEST-001 — Single shared seed user / project. Running two branches'
# E2E in parallel races on `users.email = e2e@…` and the seeded project
# slug, leading to flakes that look like real regressions. Use one
# global lock; do not cancel the in-flight run when a new commit lands
# (cancellation mid-test corrupts the seed and breaks the next run too).
concurrency:
  group: e2e-shared
  cancel-in-progress: false

jobs:
  # PR-3 — skip the entire E2E pipeline on docs-only changes.
  # Backend / agent / frontend / e2e-suite changes all warrant a run
  # because each can affect the deployed surface integration tests
  # exercise.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      run_e2e: ${{ steps.detect.outputs.run_e2e }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - name: Compute changed paths
        id: detect
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "::notice::no parent ref — running E2E"
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(git diff --name-only "$before" "${{ github.sha }}" || true)
          echo "Changed files:"
          echo "$files"

          run_e2e=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*|*.md|LICENSE|CODE_OF_CONDUCT.md|CONTRIBUTING.md|\
              .github/CODEOWNERS|.github/pull_request_template.md|\
              .github/dependabot.yml) ;;
              *) run_e2e=true ;;
            esac
          done <<< "$files"

          echo "run_e2e=$run_e2e" >> "$GITHUB_OUTPUT"
          echo "::notice::run_e2e=$run_e2e"

  backend-integration:
    name: Backend integration (httpx → deployed FastAPI)
    needs: changes
    if: needs.changes.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            backend/requirements.lock
            backend/requirements-dev.lock
      # Install runs without secrets in env so a postinstall / build hook
      # in a poisoned dep cannot read them.
      # CI-004 / DEP-009 — `--require-hashes` blocks a poisoned upstream
      # PyPI artefact from being installed.
      - run: pip install --require-hashes -r requirements.lock -r requirements-dev.lock

      # `deployed_state` tests assert that the freshly-pushed code is
      # already running on the prod URL. Vercel only deploys to prod
      # from master, and even then with ~2-min build lag. So:
      #   • dev push: skip them (`-m "integration and not deployed_state"`).
      #   • master push: poll the deployed `/health` until it answers,
      #     then run the full set.
      - name: Wait for backend + frontend deploys (master only)
        if: github.ref == 'refs/heads/master'
        env:
          E2E_BASE_URL_BACKEND: ${{ secrets.E2E_BASE_URL_BACKEND }}
          E2E_BASE_URL_FRONTEND: ${{ secrets.E2E_BASE_URL_FRONTEND }}
        run: |
          # Allow up to 4 min PER target for Vercel to roll the new
          # build. Backend usually leads frontend; the frontend probe
          # in this same step (rather than a generic sleep) is what
          # fixed the Playwright admin-spec flakes that hit the still-
          # old frontend.
          backend_url="${E2E_BASE_URL_BACKEND:-https://cms-backend-roman.vercel.app}"
          frontend_url="${E2E_BASE_URL_FRONTEND:-https://roman-technologies.dev}"

          wait_for() {
            local label=$1 url=$2
            local deadline=$(( $(date +%s) + 240 ))
            while [ "$(date +%s)" -lt "$deadline" ]; do
              if curl -fsS -o /dev/null "$url"; then
                echo "✅ $label responding ($url)"
                return 0
              fi
              echo "waiting for $label ($url)…"
              sleep 10
            done
            echo "::error::$label did not become healthy within 4 minutes"
            return 1
          }

          wait_for "backend /health"    "$backend_url/health" || exit 1
          wait_for "frontend /log-in"   "$frontend_url/log-in" || exit 1

          # Final cushion for Vercel's edge cache to repopulate after
          # the new origin response is live.
          sleep 30
          echo "✅ both targets ready"

      - name: Run integration tests (dev — skip deployed_state)
        if: github.ref != 'refs/heads/master'
        # Secrets only injected at the test step. CI-014 + CI-013.
        env:
          E2E_BASE_URL_BACKEND: ${{ secrets.E2E_BASE_URL_BACKEND }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ADMIN_API_KEY: ${{ secrets.E2E_ADMIN_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m pytest auth_service/tests_integration/ -v -m "integration and not deployed_state"

      # Adjustment-A — master only runs the deployed_state slice.
      # The rest of `-m integration` already passed on dev for THIS SHA
      # (auto-merge fast-forwards the same SHA to master). Re-running
      # them buys nothing and adds ~3 min to every change.
      - name: Run integration tests (master — deployed_state only)
        if: github.ref == 'refs/heads/master'
        env:
          E2E_BASE_URL_BACKEND: ${{ secrets.E2E_BASE_URL_BACKEND }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ADMIN_API_KEY: ${{ secrets.E2E_ADMIN_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m pytest auth_service/tests_integration/ -v -m "integration and deployed_state"

  frontend-e2e:
    name: Frontend E2E (Playwright → deployed Next.js)
    needs: [changes, backend-integration]
    if: needs.changes.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      # `--ignore-scripts` blocks postinstall hooks in a compromised
      # transitive dep (CI-005). E2E tests don't rely on any postinstall.
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright suite
        env:
          E2E_BASE_URL_FRONTEND: ${{ secrets.E2E_BASE_URL_FRONTEND }}
          E2E_BASE_URL_BACKEND: ${{ secrets.E2E_BASE_URL_BACKEND }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          # Mirrors the pytest `deployed_state` marker. Tests that
          # assert behaviour of *just-deployed* frontend code (e.g.
          # the admin pages' `?include_test=true` URL handler) skip
          # themselves unless this env is "true". Master push only.
          PLAYWRIGHT_DEPLOYED_STATE: ${{ github.ref == 'refs/heads/master' && 'true' || 'false' }}
        run: npm test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

  # PR-2 — Single aggregator job that branch protection points at.
  # `if: always()` guarantees this runs even if a path-filtered job was
  # skipped. We then accept `success` OR `skipped` as a pass; anything
  # else (failure / cancelled / timed_out) fails the gate.
  e2e-complete:
    name: E2E complete (gate)
    needs: [changes, backend-integration, frontend-e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          set -euo pipefail
          declare -A R=(
            [backend-integration]="${{ needs.backend-integration.result }}"
            [frontend-e2e]="${{ needs.frontend-e2e.result }}"
          )
          fail=0
          for j in "${!R[@]}"; do
            case "${R[$j]}" in
              success|skipped)
                echo "✅ $j: ${R[$j]}" ;;
              *)
                echo "❌ $j: ${R[$j]}"
                fail=1 ;;
            esac
          done
          if [ "$fail" = "1" ]; then
            echo "::error::one or more required E2E jobs did not succeed"
            exit 1
          fi
          echo "🎉 all required E2E jobs passed (or were path-skipped)"
