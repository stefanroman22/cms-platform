# Manual production promotion. Push freely to `dev` (no checks); click
# "Run workflow" here when you want `dev` to become production. Gates on
# secret scan + build, then fast-forwards `main` to `dev` and redeploys
# both Vercel projects (frontend + backend).
#
# Requires repo secrets: PROMOTE_TOKEN (fine-grained PAT, contents:write),
# FE_PROD_DEPLOY_HOOK, BE_PROD_DEPLOY_HOOK (Vercel production deploy hooks
# on branch `main`).
name: Promote dev → main

on:
  workflow_dispatch:

concurrency:
  group: promote-to-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: dev
          fetch-depth: 0

      # --- GATE: secret/token scan (working tree only, NOT git history) ---
      # Runs first, on the pristine checkout (before npm ci), so it never
      # walks node_modules. --no-git scans the files as a plain directory,
      # not commit history (history-scrubbing is out of scope; old rotated
      # secrets may still live in history). Same gitleaks version as
      # .pre-commit-config.yaml; rules + allowlist from .gitleaks.toml.
      - name: Secret scan (gitleaks)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks detect --source . --no-git --redact --verbose --config .gitleaks.toml

      # --- GATE: frontend lints + builds (build does the typecheck) ---
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend lint + build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      # --- GATE: backend deps install + lint + syntax ---
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Backend install + ruff + syntax
        working-directory: backend
        run: |
          pip install --require-hashes -r requirements.lock
          pip install ruff
          ruff check .
          python -m compileall -q auth_service

      # --- PROMOTE: fast-forward main = dev (HEAD is dev after checkout) ---
      - name: Fast-forward main to dev
        env:
          PROMOTE_TOKEN: ${{ secrets.PROMOTE_TOKEN }}
        run: |
          git push "https://x-access-token:${PROMOTE_TOKEN}@github.com/${{ github.repository }}.git" \
            HEAD:refs/heads/main

      # --- DEPLOY: fire both production deploy hooks ---
      - name: Redeploy production (frontend + backend)
        env:
          FE_HOOK: ${{ secrets.FE_PROD_DEPLOY_HOOK }}
          BE_HOOK: ${{ secrets.BE_PROD_DEPLOY_HOOK }}
        run: |
          curl -fsS -X POST "$FE_HOOK" && echo "frontend prod deploy triggered"
          curl -fsS -X POST "$BE_HOOK" && echo "backend prod deploy triggered"
