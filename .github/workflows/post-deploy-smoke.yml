# .github/workflows/post-deploy-smoke.yml
# PR-6 — Production smoke + auto-rollback.
#
# Master push triggers Vercel auto-deploy of backend + frontend. This
# workflow waits for both deploys to roll, then probes the critical
# user-facing endpoints. If any probe fails:
#   1. Rolls master back to its previous commit (creates a revert PR)
#   2. Opens a P0 incident issue describing the failed probe + log link
#   3. Email via Resend with the incident link
#
# Result: a broken master push is auto-reverted within ~5 minutes. The
# operator only gets pinged about the incident issue, never about the
# routine green path.
#
# Probes (kept tight — failure must be unambiguous):
#   • backend  /health                 → 200
#   • backend  /auth/me without cookie → 401
#   • frontend /log-in                 → 200 + CSP header present
#
# Rollback strategy: `git revert HEAD --no-edit` on master, push.
# Vercel auto-deploys the revert. Faster + safer than direct hard reset
# (preserves history + audit trail). The reverted commit can then be
# re-pushed to dev once fixed.

name: Post-deploy smoke + auto-rollback

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write       # needed to revert + push if smoke fails
  issues: write         # open the incident ticket

concurrency:
  group: post-deploy-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: https://cms-backend-roman.vercel.app
      FRONTEND_URL: https://roman-technologies.dev
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Vercel typically needs ~2-3 min to roll a build. Give it 5 min
      # max before declaring the deploy itself broken.
      - name: Wait for backend & frontend to roll
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 300 ))
          backend_ok=false
          frontend_ok=false
          while [ "$(date +%s)" -lt "$deadline" ]; do
            if [ "$backend_ok" = "false" ] && curl -fsS "$BACKEND_URL/health" >/dev/null; then
              echo "✅ backend /health responding"
              backend_ok=true
            fi
            if [ "$frontend_ok" = "false" ] && curl -fsS "$FRONTEND_URL/log-in" >/dev/null; then
              echo "✅ frontend /log-in responding"
              frontend_ok=true
            fi
            if $backend_ok && $frontend_ok; then
              # 60-sec cushion for Vercel edge cache to repopulate.
              sleep 60
              exit 0
            fi
            sleep 10
          done
          echo "::error::deploy never became healthy"
          exit 1

      - name: Smoke — backend /health
        run: |
          code=$(curl -s -o /tmp/health.json -w "%{http_code}" "$BACKEND_URL/health")
          [ "$code" = "200" ] || { echo "::error::backend /health: $code"; cat /tmp/health.json; exit 1; }
          grep -q '"ok"' /tmp/health.json || { echo "::error::backend /health: payload mismatch"; cat /tmp/health.json; exit 1; }

      - name: Smoke — backend /auth/me unauth = 401
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/auth/me")
          [ "$code" = "401" ] || { echo "::error::backend /auth/me unauth: expected 401, got $code"; exit 1; }

      - name: Smoke — frontend /log-in 200 + CSP header
        run: |
          tmp=$(mktemp)
          code=$(curl -s -o /dev/null -D "$tmp" -w "%{http_code}" "$FRONTEND_URL/log-in")
          [ "$code" = "200" ] || { echo "::error::frontend /log-in: $code"; cat "$tmp"; exit 1; }
          grep -iq "content-security-policy" "$tmp" || {
            echo "::error::frontend /log-in: CSP header missing"
            cat "$tmp"
            exit 1
          }
          grep -iq "frame-ancestors 'none'" "$tmp" || {
            echo "::error::frontend /log-in: CSP frame-ancestors not 'none'"
            grep -i "content-security-policy" "$tmp"
            exit 1
          }

  rollback:
    name: Auto-rollback (only on smoke failure)
    needs: smoke
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Revert latest commit + push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BAD_SHA=$(git rev-parse HEAD)
          BAD_SUBJECT=$(git log -1 --pretty=%s "$BAD_SHA")

          # `--no-edit` avoids interactive editor; `-m 1` only meaningful
          # for merge commits, harmless on regular commits.
          if ! git revert --no-edit "$BAD_SHA"; then
            echo "::error::revert failed — manual intervention needed"
            exit 1
          fi

          # Master is protected; the bot push works because the revert
          # commit will trigger a fresh CI/E2E run (which on revert tend
          # to be green by definition: we're going back to known-good).
          # If branch protection blocks even the bot, the issue below
          # will still open for human follow-up.
          git push origin master || {
            echo "::warning::could not push revert directly — opening incident issue regardless"
          }

          echo "REVERTED_SHA=$BAD_SHA"  >> "$GITHUB_ENV"
          echo "REVERTED_SUBJECT=$BAD_SUBJECT" >> "$GITHUB_ENV"

      - name: Open incident issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY_FILE=$(mktemp)
          {
            printf '## What happened\n\n'
            printf 'Post-deploy smoke check on `master` failed for commit `%s`:\n' "${REVERTED_SHA:0:7}"
            printf '\n    %s\n\n' "${REVERTED_SUBJECT}"
            printf 'The auto-rollback workflow reverted master and pushed the revert commit. Vercel is redeploying the previous good state.\n\n'
            printf '## Run\n\n[Workflow run](%s) — inspect the failed step for the exact probe that did not pass.\n\n' "$RUN_URL"
            printf '## Next steps\n\n'
            printf -- '- [ ] Check Vercel runtime logs for the bad deploy (backend + frontend).\n'
            printf -- '- [ ] Reproduce locally: `make ci` + manual hit.\n'
            printf -- '- [ ] Land the fix on `dev`. The fix re-applies the reverted change, plus the bug fix.\n'
            printf -- '- [ ] Close this issue once the fix is in master and prod is green.\n\n'
            printf '## Auto-generated\n\nThis issue was opened by `post-deploy-smoke.yml`. Edit the workflow if probes need updating.\n'
          } > "$BODY_FILE"
          gh issue create \
            --title "[incident] post-deploy smoke failed; auto-rolled back ${REVERTED_SHA:0:7}" \
            --label "incident,P0" \
            --body-file "$BODY_FILE"
