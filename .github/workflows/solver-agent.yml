name: Solver Agent (S3)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: solver-agent
  cancel-in-progress: false

jobs:
  solve:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read
      id-token: write   # required by anthropics/claude-code-action@main OIDC token fetch

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: agents/Solver - Issues/requirements.lock

      - name: Install agent deps
        run: |
          cd "agents/Solver - Issues"
          pip install --require-hashes -r requirements.lock

      - name: Claim next issue
        id: claim
        run: python "agents/Solver - Issues/claim_issue.py"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Clone client repo
        if: steps.claim.outputs.has_issue == 'true'
        run: python "agents/Solver - Issues/clone_repo.py"
        env:
          SOLVER_GITHUB_TOKEN: ${{ secrets.SOLVER_GITHUB_TOKEN }}

      - name: Read prompt file for action input
        id: prompt
        if: steps.claim.outputs.has_issue == 'true'
        run: |
          {
            echo 'text<<SOLVER_EOF'
            cat /tmp/agent-prompt.md
            echo SOLVER_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code agent
        if: steps.claim.outputs.has_issue == 'true'
        # Known bug: anthropics/claude-code-action@main crashes during post-processing
        # in workflow_dispatch + OAuth context even when the agent succeeded.
        # See https://github.com/anthropics/claude-code-action/issues/1026.
        # We continue-on-error so finalize.py can detect any file changes the
        # agent did make and commit them. Empty diff → release_issue_failed.
        continue-on-error: true
        uses: anthropics/claude-code-action@main
        env:
          # Belt-and-suspenders: also expose the OAuth token to the runner's
          # process.env so the Claude CLI / Agent SDK can resolve credentials
          # via the standard env-var auth path. The action's `with:` input
          # alone wasn't enough on first smoke (SDK couldn't find apiKey/authToken).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.text }}
          # CLI-style flags forwarded to the underlying `claude` invocation.
          # Working dir scoped to the cloned client repo so the agent can't
          # touch this repo's sources. Tool allowlist excludes git push/commit,
          # rm, and WebFetch — orchestrator handles git ops in finalize.py.
          claude_args: >-
            --cwd ./client-repo
            --model claude-sonnet-4-6
            --max-turns 15
            --allowed-tools "Read,Edit,Write,Glob,Grep,Bash(npm run *:*),Bash(node:*)"
            --disallowed-tools "Bash(git push:*),Bash(git commit:*),Bash(rm:*),WebFetch"

      - name: Commit, push, mark done
        if: steps.claim.outputs.has_issue == 'true'
        run: python "agents/Solver - Issues/finalize.py"
        env:
          SOLVER_GITHUB_TOKEN: ${{ secrets.SOLVER_GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CMS_API_TOKEN: ${{ secrets.CMS_API_TOKEN }}
          CMS_BACKEND_URL: https://cms-backend-roman.vercel.app

      - name: Release on failure
        if: failure() && steps.claim.outputs.has_issue == 'true'
        run: python "agents/Solver - Issues/release_issue.py"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOLVER_MAX_RETRIES: '3'
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ISSUES_CHANNEL_ID: ${{ secrets.SLACK_ISSUES_CHANNEL_ID }}
