# .github/workflows/auto-merge-dev-to-master.yml
# PR-5 — Auto-promote dev → master on every green push.
#
# Trigger: a CI or E2E workflow finishes on dev. We then verify BOTH
# workflows are completed + green for the same SHA before merging.
# Replaces the weekly Friday cron with continuous promotion.
#
# Safety properties:
#   • Only fires when both CI and E2E are green on the dev tip SHA —
#     status checks are attached to the SHA, so fast-forwarding master
#     to that SHA preserves green state and satisfies branch protection.
#   • `concurrency` lock prevents parallel merges racing on master ref.
#   • Skips silently if dev tip moved between trigger and merge attempt
#     (next push will trigger the next merge).
#   • `[skip-merge]` tag in the latest dev commit body opts out — used
#     for in-flight multi-commit batches you don't want auto-promoted
#     mid-stream.
#
# Failure modes that DON'T merge:
#   • Either workflow not yet complete → exit 0 (other trigger will retry)
#   • Either workflow conclusion ≠ success → exit 0 (let dev push fail visibly)
#   • Branch protection still rejects → exit non-zero (loud)

name: Auto-merge dev → master

on:
  workflow_run:
    workflows: ["CI", "E2E"]
    types: [completed]
    branches: [dev]

# Needs write to push master. Status-check guard above ensures we only
# push when CI+E2E for the SHA are green.
# `actions: write` lets the final step `gh workflow run …` dispatch
# the master-only follow-on workflows (E2E full suite, post-deploy
# smoke, CodeQL). GITHUB_TOKEN-authenticated pushes do NOT trigger
# `push:` workflows; `workflow_dispatch` is allowed.
permissions:
  contents: write
  actions: write

concurrency:
  group: auto-merge-dev-to-master
  cancel-in-progress: false

jobs:
  merge:
    # workflow_run fires for completed runs of any conclusion. Skip the
    # rest if THIS run was not a success (the other one might still be).
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      # Adjustment-B — debounce. workflow_run fires twice per dev push
      # (one for CI, one for E2E). Five rapid commits = five trigger
      # events → up to five auto-merge attempts. Sleep 60s up front;
      # the next "is dev still at this SHA?" check below then collapses
      # the flurry to ONE successful promotion (the latest SHA wins;
      # earlier triggers exit silently because dev has moved past
      # their gate SHA).
      - name: Settle window (debounce rapid-fire triggers)
        run: sleep 60

      - name: Verify both CI + E2E green on dev tip SHA
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "gating SHA: $SHA"

          for WF in "CI" "E2E"; do
            CONCLUSION=$(gh api \
              "repos/${{ github.repository }}/actions/runs?head_sha=$SHA&per_page=20" \
              --jq "[.workflow_runs[] | select(.name==\"$WF\")][0] | .conclusion // \"\"")
            STATUS=$(gh api \
              "repos/${{ github.repository }}/actions/runs?head_sha=$SHA&per_page=20" \
              --jq "[.workflow_runs[] | select(.name==\"$WF\")][0] | .status // \"\"")
            echo "$WF: status=$STATUS conclusion=$CONCLUSION"
            if [ "$STATUS" != "completed" ]; then
              echo "::notice::$WF still in progress on $SHA — exiting; next trigger will retry"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$CONCLUSION" != "success" ]; then
              echo "::notice::$WF on $SHA is '$CONCLUSION' — refusing to merge"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout master
        if: steps.gate.outputs.ready == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward master to dev tip
        if: steps.gate.outputs.ready == 'true'
        env:
          DEV_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin dev

          MASTER_SHA=$(git rev-parse master)
          CURRENT_DEV_SHA=$(git rev-parse origin/dev)

          if [ "$MASTER_SHA" = "$CURRENT_DEV_SHA" ]; then
            echo "✅ master already at dev tip — nothing to do"
            exit 0
          fi
          if [ "$CURRENT_DEV_SHA" != "$DEV_SHA" ]; then
            echo "::notice::dev moved from $DEV_SHA to $CURRENT_DEV_SHA — skipping; next trigger will retry"
            exit 0
          fi

          # Skip if the latest dev commit explicitly opts out.
          MSG=$(git log -1 --pretty=%B "$DEV_SHA")
          if echo "$MSG" | grep -qi '\[skip-merge\]'; then
            echo "::notice::dev tip carries [skip-merge] — not promoting"
            exit 0
          fi

          git merge --ff-only "$DEV_SHA"
          git push origin master
          echo "🎉 master fast-forwarded to $DEV_SHA"

      # Master push above is authenticated via GITHUB_TOKEN. GitHub
      # explicitly does NOT trigger child workflows from such pushes
      # (loop-prevention rule). To get E2E full-suite + post-deploy
      # smoke + CodeQL running on the new master tip, we dispatch
      # them manually via `workflow_dispatch` — which IS allowed under
      # GITHUB_TOKEN per the same docs.
      - name: Dispatch master-only workflows
        if: steps.gate.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for wf in "E2E" "Post-deploy smoke + auto-rollback" "CodeQL"; do
            echo "→ dispatching '$wf' on master"
            gh workflow run "$wf" --ref master || {
              echo "::warning::failed to dispatch $wf — likely missing workflow_dispatch trigger"
            }
          done
