name: CI

on:
  push:
    branches: [master, dev]
  workflow_dispatch:

# Default-deny token scope. Jobs that need write must opt in explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0   # gitleaks scans full history on the pushed branch
      - uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy values so `auth_service.core.config.Settings()` instantiates
      # at import time (config.py:58). Real values live in Vercel for prod.
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_ROLE: dummy-service-role
      RESEND_API_KEY: dummy-resend-key
      RESEND_FROM_EMAIL: noreply@example.com
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            backend/requirements.lock
            backend/requirements-dev.lock
      # CI-004 / DEP-009 — `--require-hashes` blocks a poisoned upstream
      # PyPI artefact from being installed even when the version pin
      # matches. Generated via `pip-compile --generate-hashes`; refresh
      # whenever requirements{,-dev}.txt change.
      - run: pip install --require-hashes -r requirements.lock -r requirements-dev.lock
      - name: Lint (ruff)
        run: ruff check .
        working-directory: .
      - name: Format check (black)
        run: black --check .
        working-directory: .
      - name: Tests (pytest)
        run: python -m pytest auth_service/tests/ -q

  agent:
    name: Agent (CMS Connector — Website)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/CMS Connector - Website
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            agents/CMS Connector - Website/requirements.lock
            agents/CMS Connector - Website/requirements-dev.lock
      # CI-004 / DEP-009 — see backend job comment.
      - run: pip install --require-hashes -r requirements.lock -r requirements-dev.lock
      - name: Tests (pytest)
        run: python -m pytest tests/ -q

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # `--ignore-scripts` blocks postinstall hooks in a compromised
      # transitive dep (CI-005). The frontend's own `prepare` / `build`
      # scripts are invoked explicitly via `npm run` below.
      - run: npm ci --ignore-scripts
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Tests
        run: npm test
