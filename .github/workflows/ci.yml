name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
        working-directory: .
      - name: Format check (black)
        run: black --check .
        working-directory: .
      - name: Tests (pytest)
        run: python -m pytest auth_service/tests/ -q

  agent:
    name: Agent (CMS Connector — Website)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/CMS Connector - Website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            agents/CMS Connector - Website/requirements.txt
            agents/CMS Connector - Website/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Tests (pytest)
        run: python -m pytest tests/ -q

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Tests
        run: npm test
