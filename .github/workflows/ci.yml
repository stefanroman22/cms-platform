name: CI

# Adjustment-C — extend triggers to cover feature branches and PRs:
#   • push to master/dev: full pipeline + auto-merge eligibility
#   • push to fix/**, feat/**, chore/**: same pipeline so a typo on a
#     feature branch fails fast; doesn't trigger E2E (separate
#     workflow gates on dev/master only)
#   • pull_request: catches PRs from forks / external contributors
on:
  push:
    branches:
      - master
      - dev
      - "fix/**"
      - "feat/**"
      - "chore/**"
      - "feature/**"
  pull_request:
  workflow_dispatch:

# Default-deny token scope. Jobs that need write must opt in explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR-3 — compute which areas changed so per-job `if:` can skip work.
  # Avoids running backend pytest on a docs-only change. Uses git diff
  # against `github.event.before` so no third-party action is needed
  # (keeps SHA-pinning surface small — CI-002).
  #
  # First push to a new branch (`before == 000…0`) → run everything.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      agent: ${{ steps.detect.outputs.agent }}
      frontend: ${{ steps.detect.outputs.frontend }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - name: Compute changed paths
        id: detect
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "::notice::no parent ref — running every job"
            echo "backend=true"  >> "$GITHUB_OUTPUT"
            echo "agent=true"    >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(git diff --name-only "$before" "${{ github.sha }}" || true)
          echo "Changed files:"
          echo "$files"

          backend=false
          agent=false
          frontend=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              backend/*|pyproject.toml|.python-version)             backend=true ;;
              agents/*)                                              agent=true ;;
              frontend/*)                                            frontend=true ;;
              # Workflow / shared-tooling changes touch every job.
              .github/workflows/ci.yml|.pre-commit-config.yaml|\
              .gitleaks.toml|Makefile|requirements*.lock)
                backend=true; agent=true; frontend=true ;;
              # docs / licence / community files: no code job needed.
              docs/*|*.md|LICENSE|CODE_OF_CONDUCT.md|CONTRIBUTING.md|\
              .github/CODEOWNERS|.github/pull_request_template.md|\
              .github/dependabot.yml) ;;
              # Anything else is suspicious — be safe, run all.
              *) backend=true; agent=true; frontend=true ;;
            esac
          done <<< "$files"

          echo "backend=$backend"   >> "$GITHUB_OUTPUT"
          echo "agent=$agent"       >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "::notice::backend=$backend agent=$agent frontend=$frontend"

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0   # gitleaks scans full history on the pushed branch
      - uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  backend:
    name: Backend (FastAPI)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy values so `auth_service.core.config.Settings()` instantiates
      # at import time (config.py:58). Real values live in Vercel for prod.
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_ROLE: dummy-service-role
      RESEND_API_KEY: dummy-resend-key
      RESEND_FROM_EMAIL: noreply@example.com
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            backend/requirements.lock
            backend/requirements-dev.lock
      # CI-004 / DEP-009 — `--require-hashes` blocks a poisoned upstream
      # PyPI artefact from being installed even when the version pin
      # matches. Generated via `pip-compile --generate-hashes`; refresh
      # whenever requirements{,-dev}.txt change.
      - run: pip install --require-hashes -r requirements.lock -r requirements-dev.lock
      - name: Lint (ruff)
        run: ruff check .
        working-directory: .
      - name: Format check (black)
        run: black --check .
        working-directory: .
      # Adjustment-F — coverage threshold gate. Floor set to 60 % to
       # match the current 66 % baseline with 6pp headroom for benign
       # refactors. Bump the floor when coverage rises sustainably.
      - name: Tests (pytest + coverage gate)
        run: python -m pytest auth_service/tests/ -q --cov --cov-report=term --cov-fail-under=60

  agent:
    name: Agent (CMS Connector — Website)
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/CMS Connector - Website
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            agents/CMS Connector - Website/requirements.lock
            agents/CMS Connector - Website/requirements-dev.lock
      # CI-004 / DEP-009 — see backend job comment.
      - run: pip install --require-hashes -r requirements.lock -r requirements-dev.lock
      - name: Tests (pytest)
        run: python -m pytest tests/ -q

  frontend:
    name: Frontend (Next.js)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # `--ignore-scripts` blocks postinstall hooks in a compromised
      # transitive dep (CI-005). The frontend's own `prepare` / `build`
      # scripts are invoked explicitly via `npm run` below.
      - run: npm ci --ignore-scripts
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Tests
        run: npm test

  # PR-2 — Single aggregator job that branch protection points at.
  # `if: always()` guarantees this runs even if a path-filtered job was
  # skipped. We then accept `success` OR `skipped` as a pass; anything
  # else (failure / cancelled / timed_out) fails the gate.
  ci-complete:
    name: CI complete (gate)
    needs: [changes, secrets, backend, agent, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          set -euo pipefail
          declare -A R=(
            [secrets]="${{ needs.secrets.result }}"
            [backend]="${{ needs.backend.result }}"
            [agent]="${{ needs.agent.result }}"
            [frontend]="${{ needs.frontend.result }}"
          )
          fail=0
          for j in "${!R[@]}"; do
            case "${R[$j]}" in
              success|skipped)
                echo "✅ $j: ${R[$j]}" ;;
              *)
                echo "❌ $j: ${R[$j]}"
                fail=1 ;;
            esac
          done
          if [ "$fail" = "1" ]; then
            echo "::error::one or more required CI jobs did not succeed"
            exit 1
          fi
          echo "🎉 all required CI jobs passed (or were path-skipped)"
