# .github/workflows/codeql.yml
# PR-8 — CodeQL static analysis. Closes audit finding CI-018.
#
# Runs:
#   • weekly Sunday 03:00 UTC (standing SAST scan)
#   • manually via workflow_dispatch
# Push triggers were removed 2026-06-09 — dev/main pushes run no checks.
#
# Findings surface in the "Security → Code scanning" tab. No manual config
# beyond enabling Code Scanning.

name: CodeQL

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: ${{ matrix.language }}
          # `security-extended` adds CWE-mapped query packs beyond the
          # default — better recall on auth + crypto bugs at modest
          # cost (~30s/run).
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: "/language:${{ matrix.language }}"
