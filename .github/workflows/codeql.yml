# .github/workflows/codeql.yml
# PR-8 — CodeQL static analysis. Closes audit finding CI-018.
#
# Runs:
#   • on every push to master + dev (catches regressions same-day)
#   • weekly Sunday 03:00 UTC (catches new query-set findings against
#     code that didn't change)
#
# Findings surface in the "Security → Code scanning" tab. Critical /
# high results auto-open issues via Dependabot's security workflow
# integration. No manual config beyond enabling Code Scanning.

name: CodeQL

on:
  push:
    branches: [master, dev]
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4c9ed4eb16eee5e92a5db3d9c1d2cd7a76c04181 # v3.27.0
        with:
          languages: ${{ matrix.language }}
          # `security-extended` adds CWE-mapped query packs beyond the
          # default — better recall on auth + crypto bugs at modest
          # cost (~30s/run).
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@4c9ed4eb16eee5e92a5db3d9c1d2cd7a76c04181 # v3.27.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4c9ed4eb16eee5e92a5db3d9c1d2cd7a76c04181 # v3.27.0
        with:
          category: "/language:${{ matrix.language }}"
